      <text x="279" y="60" class="gold" font-size="28">XS</text><text x="397" y="60" class="gold" font-size="28">S</text>
      <text x="515" y="60" class="gold" font-size="28">M</text><text x="633" y="60" class="gold" font-size="28">L</text>
      <text x="751" y="60" class="gold" font-size="28">XL</text><text x="870" y="60" class="gold" font-size="28">2XL</text>
