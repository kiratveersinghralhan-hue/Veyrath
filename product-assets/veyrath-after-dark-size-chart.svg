      <stop offset="0" stop-color="#080808"/><stop offset="0.55" stop-color="#11100e"/><stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.25" r="0.75">
      <stop offset="0" stop-color="#b78b48" stop-opacity=".2"/><stop offset="1" stop-color="#b78b48" stop-opacity="0"/>
    </radialGradient>
    <style>
      .sans{font-family:Arial,Helvetica,sans-serif}.gold{fill:#d6ad6b}.muted{fill:#aaa39a}.white{fill:#f4f0e8}
