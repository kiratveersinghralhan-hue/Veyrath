<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop VEYRATH | Oversized Streetwear</title>
  <meta name="description" content="Shop VEYRATH oversized T-shirts, hoodies, lowers and accessories. Premium Indian streetwear made after order.">
  <link rel="canonical" href="https://kiratveersinghralhan-hue.github.io/Veyrath/shop.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shop VEYRATH">
  <meta property="og:description" content="Dark luxury streetwear, built in India.">
  <meta property="og:image" content="https://kiratveersinghralhan-hue.github.io/Veyrath/veyrath-tee.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#080808">
  <link rel="icon" href="favicon.svg">
  <link rel="stylesheet" href="styles.css?v=20260718-launch-release">
</head>
<body data-page="shop">
  <div data-site-header></div>
  <main id="main">
    <header class="page-hero">
      <p class="eyebrow">The catalogue</p>
      <h1>Quiet forms.<br>Loud presence.</h1>
      <p>Every published VEYRATH piece lives here. Filter by what matters, then move when the signal feels right.</p>
    </header>
    <div class="shop-layout">
      <form class="filters" id="catalogueFilters">
        <div class="filter-line"><h2>Filter the drop</h2><button class="clear-button" id="clearFilters" type="button">Clear</button></div>
        <div class="filter-field"><label for="filterSearch">Search</label><input id="filterSearch" name="search" type="search" placeholder="Name, tag or mood"></div>
        <div class="filter-field"><label for="filterCategory">Category</label><select id="filterCategory" name="category"><option value="">All categories</option></select></div>
        <div class="filter-field"><label for="filterGender">Gender</label><select id="filterGender" name="gender"><option value="">All</option></select></div>
        <div class="filter-field"><label for="filterSize">Size</label><select id="filterSize" name="size"><option value="">All sizes</option></select></div>
        <div class="filter-field"><label for="filterColour">Colour</label><select id="filterColour" name="colour"><option value="">All colours</option></select></div>
        <div class="filter-field"><label for="filterStyle">Style</label><select id="filterStyle" name="style"><option value="">All styles</option></select></div>
        <div class="filter-field"><label for="filterRating">Minimum rating</label><select id="filterRating" name="rating"><option value="">Any rating</option><option value="4">4+ stars</option><option value="4.5">4.5+ stars</option></select></div>
        <div class="filter-field"><label for="filterPrice">Price up to <span id="priceLabel"></span></label><input id="filterPrice" name="price" type="range" min="0" step="100"></div>
        <div class="filter-field"><label for="filterSort">Sort</label><select id="filterSort" name="sort"><option value="newest">Newest</option><option value="price-low">Price: low to high</option><option value="price-high">Price: high to low</option><option value="rating">Highest rated</option></select></div>
      </form>
      <section>
        <div class="catalogue-head"><h2>VEYRATH collection</h2><span id="resultCount">0 pieces</span></div>
        <div class="product-grid" id="productGrid"></div>
      </section>
    </div>
    <section class="container inner-circle" id="inner-circle">
      <div><p class="eyebrow">No signal missed</p><h2>Enter the<br>Inner Circle.</h2></div>
      <form class="newsletter-form">
        <p>Get early access to new drops and exclusive offers.</p>
        <label><span class="sr-only">Email</span><input name="email" type="email" placeholder="Your email address" required><button type="submit" aria-label="Join">&rarr;</button></label>
        <small class="form-message"></small>
      </form>
    </section>
  </main>
  <div data-site-footer></div>
  <script src="site-data.js?v=20260718-launch-release" defer></script>
  <script src="products.js?v=20260718-launch-release" defer></script>
  <script src="supabase-config.js?v=20260718-launch-release" defer></script>
  <script src="analytics-config.js?v=20260718-launch-release" defer></script><script src="analytics.js?v=20260718-launch-release" defer></script><script src="app.js?v=20260718-launch-release" defer></script>
  <script src="checkout.js?v=20260718-launch-release" defer></script>
</body>
</html>
